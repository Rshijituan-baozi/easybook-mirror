<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order Complete - Easybook</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);max-width:420px;width:90%;padding:40px 32px;text-align:center}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:22px;margin-bottom:8px;color:#2e7d32}
p{font-size:14px;color:#666;line-height:1.6}
.booking-ref{background:#f0f0f0;border-radius:8px;padding:12px;margin:20px 0;font-size:16px;font-weight:700;letter-spacing:1px;color:#333}
.summary{text-align:left;background:#fafafa;border-radius:8px;padding:16px;margin:16px 0}
.summary-item{display:flex;justify-content:space-between;padding:4px 0;font-size:13px}
.summary-item .label{color:#888}
.summary-item .value{font-weight:500}
.btn{display:inline-block;padding:12px 32px;background:#7b2d8b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;margin-top:8px}
.btn:hover{background:#6a1f7a}
</style>
</head>
<body>

<div class="card" id="app">
  <div class="icon">&#10003;</div>
  <h1>Order Confirmed!</h1>
  <p>Your booking has been confirmed. Please check your email for the order summary.</p>

  <div class="booking-ref" id="bookingRef">Booking Reference: EB--------</div>

  <div class="summary" id="summary">
    <div class="summary-item"><span class="label">Product</span><span class="value" id="sProduct">-</span></div>
    <div class="summary-item"><span class="label">Route</span><span class="value" id="sRoute">-</span></div>
    <div class="summary-item"><span class="label">Date</span><span class="value" id="sDate">-</span></div>
  </div>

  <a href="/" class="btn">Back to Home</a>
</div>

<script>
(function(){
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var ref = '';
  for (var i = 0; i < 8; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
  document.getElementById('bookingRef').textContent = 'Booking Reference: EB-' + ref;

  var bookingData = {};
  try {
    bookingData = JSON.parse(sessionStorage.getItem('easybook_booking') || '{}');
  } catch(e) {}

  if (bookingData.productType || bookingData.origin) {
    document.getElementById('sProduct').textContent = bookingData.productType || 'Bus';
    document.getElementById('sRoute').textContent = (bookingData.origin || '?') + ' → ' + (bookingData.destination || '?');
    document.getElementById('sDate').textContent = bookingData.departureDate || bookingData.date || '-';
  } else {
    document.getElementById('summary').style.display = 'none';
  }
})();
</script>
</body>
</html>
